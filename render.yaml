services:
  - type: web
    name: vedaai-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: vedaai-mongo
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vedaai-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: worker
    name: vedaai-worker
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node dist/workers/assessmentWorker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: vedaai-mongo
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vedaai-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: vedaai-mongo
    databaseName: vedaai
    plan: free

  - name: vedaai-redis
    plan: free
